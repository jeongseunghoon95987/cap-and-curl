name: Auto Screenshot Bot

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/10 * * * *' # 매 정각마다 실행 (UTC 기준)
  workflow_dispatch: # 수동으로 실행하고 싶을 때 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install selenium webdriver-manager

    - name: Run Screenshot Script
      run: |
        python auto_screenshot_headless.py # GUI를 제외한 실행용 스크립트 파일명

    - name: Upload Screenshots Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-screenshots # 다운로드 시 표시될 이름
        path: screenshots/ # 스크린샷이 저장된 폴더 경로
        retention-days: 5 # 보관 기간 (최대 90일)
